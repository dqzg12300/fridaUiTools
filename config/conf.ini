[kmain]
language = China
frida_name = fservice
usb_port = 12345
wifi_addr = 127.0.0.1
wifi_port = 1234

[gumtrace]
name = GumTrace Live Profile
filename = gumtrace_live_profile.js
mode = manual
tracemodulewhitelist = libtarget.so
triggermodulename = libtarget.so
triggeroffsets = 0x1234
triggerexports = SSL_read,SSL_write
traceoutputpath = /data/local/tmp/gumtrace.log
allowedthreadids = 
tracethreadid = 0
traceoptions = 0
stoptraceonleave = True
allowrepeatedtrace = False
autoaddhook = True
opendirafterdownload = True

